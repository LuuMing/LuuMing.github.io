<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuMing 的作品</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

        /* Header */
        header {
            padding: 60px 0 40px;
            text-align: center;
        }
        header h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 8px;
        }
        header p {
            font-size: 15px;
            color: #888;
        }

        /* App Cards */
        .apps { padding-bottom: 60px; }
        .app-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            display: flex;
            gap: 28px;
            align-items: center;
            transition: transform 0.2s;
        }
        .app-card:hover { transform: translateY(-2px); }
        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 20px;
            background: linear-gradient(135deg, #E94560, #6c1d2e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            flex-shrink: 0;
        }
        .app-info { flex: 1; }
        .app-info h2 {
            font-size: 22px;
            color: #fff;
            margin-bottom: 8px;
        }
        .app-info p {
            font-size: 14px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .app-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .tag {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(233, 69, 96, 0.15);
            color: #E94560;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #E94560;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .download-btn:hover { background: #c73a52; }
        .download-btn svg { width: 18px; height: 18px; fill: #fff; }

        /* Coming Soon */
        .coming-soon {
            text-align: center;
            padding: 40px;
            color: #555;
            font-size: 15px;
            border: 1px dashed #333;
            border-radius: 16px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 24px 0;
            font-size: 12px;
            color: #444;
        }
        footer a {
            color: #444;
            text-decoration: none;
        }
        footer a:hover {
            color: #666;
        }

        @media (max-width: 600px) {
            .app-card {
                flex-direction: column;
                text-align: center;
                padding: 24px;
            }
            .app-tags { justify-content: center; }
            header { padding: 40px 0 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LuMing 的作品</h1>
            <p>独立开发者 / Android & Web</p>
        </header>

        <div class="apps">
            <!-- AvalonHelper2 -->
            <div class="app-card">
                <div class="app-icon">&#x2694;</div>
                <div class="app-info">
                    <h2>Avalon Helper 2</h2>
                    <p>阿瓦隆桌游终极辅助工具。支持角色分配与语音播报、AI 智能对战分析、任务追踪、投票记录，适用于 5-10 人游戏。</p>
                    <div class="app-tags">
                        <span class="tag">桌游</span>
                        <span class="tag">Android</span>
                        <span class="tag">AI 对战</span>
                    </div>
                    <a href="https://play.google.com/store/apps/details?id=com.luming.avalonhelper2" class="download-btn" target="_blank" rel="noopener">
                        <svg viewBox="0 0 24 24"><path d="M3.18 23.72c-.36-.18-.61-.56-.61-1.02L.85 1.3C.85.84 1.1.46 1.46.28l10.08 11.72L3.18 23.72zm1.06 .94l11.6-6.51-2.77-3.22-8.83 9.73zm14.48-8.14l-3.2-1.8-3.04 3.54 3.04 3.54 3.2-1.8c.89-.5.89-1.76 0-2.26V16.52zm-3.2-5.24l-11.6-6.51.02.01 8.81 9.72 2.77-3.22z"/></svg>
                        Google Play
                    </a>
                </div>
            </div>

            <!-- 喵喵守护者 -->
            <div class="app-card">
                <div class="app-icon" style="background: linear-gradient(135deg, #f8a5b6, #e8758a);">&#x1F431;</div>
                <div class="app-info">
                    <h2>喵喵守护者</h2>
                    <p>通过 AI 图像识别 + GPS 定位守护路上的每一只猫咪。车载摄像头自动检测猫咪并上报位置，经过猫咪出没区域时自动提醒驾驶者，减少猫咪伤亡。</p>
                    <div class="app-tags">
                        <span class="tag">AI 识别</span>
                        <span class="tag">Android</span>
                        <span class="tag">公益</span>
                    </div>
                    <a href="http://www.miaomiao.help" class="download-btn" target="_blank" rel="noopener" style="background: #e8758a;">
                        &#x1F310;&nbsp; 官网
                    </a>
                </div>
            </div>

            <!-- More coming -->
            <div class="coming-soon">
                更多作品即将上线...
            </div>
        </div>

        <footer>
            <p>&copy; 2026 LuMing &nbsp;&middot;&nbsp; <a href="/blog.html">我的过去</a></p>
        </footer>
    </div>
</body>
</html>
